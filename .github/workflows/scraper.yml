name: Autonomous AI Job Hunter

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  scrape-jobs:
    name: Scrape & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary google-generativeai

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run Job Hunter (Single Cycle)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: .
          ALLOW_FALLBACK_JOBS: 0
          ALLOW_MOCK_FALLBACK: 0
          JOB_WINDOW: 2d
          LOCATION_PRIMARY: India
          EXPERIENCE_LEVEL: 0-2 years
          JOB_TYPE: "Job,Internship"
          MAX_NOTIFY_JOBS: "40"
          ENABLE_TELEGRAM_NOTIFICATIONS: "1"
        run: python main.py --once

      - name: Upload Run Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: data/ci/master_pipeline.log
          if-no-files-found: ignore
          retention-days: 3
