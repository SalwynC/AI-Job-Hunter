name: Autonomous AI Job Hunter

on:
  schedule:
    # Runs every 2 hours at minute 0
    - cron: '0 */2 * * *'
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-jobs:
    timeout-minutes: 60 # Increased to 60 to accommodate 40+ job role cycles
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Manually install all production-critical libraries since we are excluding .txt files from the repo
          pip install requests beautifulsoup4 playwright lxml \
                      pandas numpy openpyxl \
                      sqlalchemy psycopg2-binary \
                      python-telegram-bot google-generativeai \
                      python-dotenv pyyaml schedule pytz apscheduler loguru
          
      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Execute Autonomous Scraper
        env:
          # Injected Secrets from GitHub Repository Settings
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Cloud optimization Overrides (to prevent loading local env file issues)
          PYTHONPATH: .
          ENABLE_BACKGROUND_RUNNER: 0 # Only want a single run, not a while-loop
        run: |
          # We execute main.py --once to process all roles flawlessly
          python main.py --once
